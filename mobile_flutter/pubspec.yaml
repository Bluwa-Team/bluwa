name: bluwa_mobile
description: "Bluwa ERP — app terrain (réception, qualité, production, inventaire, ventes)"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Figtree
      fonts:
        - asset: assets/fonts/Figtree_400Regular.ttf
          weight: 400
        - asset: assets/fonts/Figtree_500Medium.ttf
          weight: 500
        - asset: assets/fonts/Figtree_600SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Figtree_700Bold.ttf
          weight: 700
        - asset: assets/fonts/Figtree_800ExtraBold.ttf
          weight: 800
